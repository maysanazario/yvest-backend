spring.application.name=yvest
server.port=8087
server.address=0.0.0.0

#Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Auto generate DDL
spring.jpa.hibernate.ddl-auto = update

#Show sql
spring.jpa.show-sql=true

# ===== OLLAMA CONFIG =====
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=phi3:mini

app.finance-chat.cache.enabled=true
app.finance-chat.cache.duration=600000
app.finance-chat.ollama.timeout=30000

# Logging for debugging
logging.level.com.fateccotia.yvest.service.FinanceChatService=DEBUG